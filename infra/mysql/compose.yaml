name: autoedit-db

services:
  mysql:
    image: mysql:8.4
    container_name: autoedit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-autoedit_root_dev}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-autoedit}
      MYSQL_USER: ${MYSQL_USER:-autoedit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-autoedit_dev_password}
      TZ: ${TZ:-Europe/London}
    ports:
      # Bound to the Unraid host loopback only. Use an SSH tunnel from the dev container:
      # ssh -L 33306:127.0.0.1:3307 root@192.168.50.50
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ${MYSQL_DATA_DIR:-/mnt/user/appdata/autoedit-mysql/data}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
